name: Report outdated info
description: A dead link, renamed programme, changed fee or deadline
title: "[outdated] "
labels: ["outdated"]
body:
  - type: input
    id: entry
    attributes:
      label: Which entry?
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What changed?
      description: Include a source (official page) if you have one.
    validations:
      required: true
