name: Suggest a programme
description: Propose a new programme for the list
title: "[programme] "
labels: ["suggestion"]
body:
  - type: input
    id: name
    attributes:
      label: "Programme name"
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link
      description: Official page, loads without login.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: University, official programme name, city, duration, language, and a link to the official programme page (not an aggregator).
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it belongs here
      description: See CONTRIBUTING.md for the inclusion bar.
    validations:
      required: true
